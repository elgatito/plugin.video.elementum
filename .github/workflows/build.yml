name: build

on:
    push:
        branches:
            - "*"
        tags:
            - v*
    pull_request:
        branches:
            - "*"
    workflow_dispatch:
        inputs:
            assets_source_repo:
                description: "Repository to download pipeline assets from (owner/repo)"
                required: false
                type: string
                default: "elgatito/elementum-binaries"
            assets_source_branch:
                description: "Branch to download assets from"
                required: false
                type: string
                default: "master"
            trigger_repo:
                description: "Repository to trigger pipeline on (owner/repo)"
                required: false
                type: string
                default: "ElementumOrg/context.elementum"
            trigger_branch:
                description: "Branch to trigger the pipeline on"
                required: false
                type: string
                default: "master"
            trigger_workflow:
                description: "Workflow filename or ID to trigger"
                required: false
                type: string
                default: "build.yml"

jobs:
    build:
        name: Build
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Checkout platform_detect
              uses: actions/checkout@v6
              with:
                  repository: ElementumOrg/platform_detect
                  ref: master
                  path: resources/site-packages/platform_detect

            # - name: Checkout binaries
            #   uses: actions/checkout@v6
            #   with:
            #       repository: elgatito/elementum-binaries
            #       ref: master
            #       path: resources/bin

            - name: Download pipeline assets
              uses: dawidd6/action-download-artifact@v17
              with:
                  github_token: ${{ secrets.GH_TOKEN }}
                  repo: ${{ inputs.assets_source_repo || 'elgatito/elementum' }}
                  branch: ${{ inputs.assets_source_branch || 'master' }}
                  workflow_conclusion: success
                  path: resources/bin
                  name: elementum-binaries.zip

            - name: Set up Python 3.7
              uses: actions/setup-python@v5
              with:
                  python-version: 3.7

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install flake8

            - name: Lint
              run: flake8

            - name: Build
              run: |
                make
                make zipfiles
                asset_path=$(ls *.zip)
                echo "::set-output name=asset_path::${asset_path}"
                echo "::set-output name=asset_name::$(basename "${asset_path}")"

    release:
        name: Release
        runs-on: ubuntu-22.04
        needs: build
        if: success() && github.event_name == 'create' && startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Install Go
              uses: actions/setup-go@master
              with:
                  go-version: 1.25.x

            - name: Install github-release
              run: go install github.com/github-release/github-release@latest

            - name: Perform release
              run: |
                  make upload
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Trigger downstream pipeline
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const [owner, repo] = "${{ inputs.trigger_repo || 'ElementumOrg/context.elementum' }}".split("/");
                      const workflow_id = "${{ inputs.trigger_workflow || 'build.yml' }}";
                      const ref = "${{ inputs.trigger_branch || 'master' }}";

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id,
                        ref,
                      });

                      console.log(`Triggered ${workflow_id} on ${owner}/${repo}@${ref}`);
